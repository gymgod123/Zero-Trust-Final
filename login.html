<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Đăng nhập Bảo mật</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .login-card {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 380px;
            border: 1px solid var(--border);
        }

        h2 { text-align: center; margin-bottom: 2rem; font-weight: 600; font-size: 1.8rem; }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.9rem; font-weight: 500; }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background-color: #0f172a;
            color: var(--text-main);
            box-sizing: border-box;
            font-size: 1rem;
            transition: border 0.2s, box-shadow 0.2s;
        }

        input::placeholder { color: #475569; }
        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 700;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-top: 15px;
        }

        button:hover { background-color: var(--primary-hover); }
        button:active { transform: translateY(1px); }

        .footer-link {
            text-align: center;
            margin-top: 1.8rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        .footer-link a { color: var(--primary); text-decoration: none; font-weight: 500; }
        .footer-link a:hover { text-decoration: underline; }

        /* --- STYLES CHO TOAST NOTIFICATION --- */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            min-width: 280px;
            padding: 16px 20px;
            border-radius: 8px;
            color: white;
            font-size: 0.95rem;
            font-weight: 500;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            transform: translateX(120%);
            opacity: 0;
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55), opacity 0.4s ease;
            display: flex;
            align-items: center;
        }

        .toast.show { transform: translateX(0); opacity: 1; }
        .toast.success { background-color: #1e293b; border-left: 6px solid #10b981; }
        .toast.error { background-color: #1e293b; border-left: 6px solid #ef4444; }
    </style>
</head>
<body>
    <div id="toast-container" class="toast-container"></div>

    <div class="login-card">
        <h2>Hệ Thống Xác Thực</h2>
        <div class="form-group">
            <label>Tên đăng nhập</label>
            <input type="text" id="user" placeholder="Nhập username...">
        </div>
        <div class="form-group">
            <label>Mật khẩu</label>
            <input type="password" id="pass" placeholder="••••••••">
        </div>
        <button onclick="handleLogin()">Đăng Nhập</button>
        <div class="footer-link">
            Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a>
        </div>
    </div>

    <script>
        // Hàm hiển thị Toast
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerText = message;
            
            container.appendChild(toast);
            
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        }

        // Xử lý đăng nhập
        async function handleLogin() {
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;

            if(!user || !pass) {
                showToast("Vui lòng nhập đầy đủ thông tin!", "error");
                return;
            }

            let formData = new FormData();
            formData.append('username', user);
            formData.append('password', pass);

            try {
                const response = await fetch('http://localhost:8000/login', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('access_token', data.access_token);
                    showToast("Đăng nhập thành công! Đang chuyển hướng...", "success");
                    
                    setTimeout(() => {
                        const payload = JSON.parse(atob(data.access_token.split('.')[1]));
                        if (payload.role === 'admin') {
                            window.location.href = 'admin.html';
                        } else {
                            window.location.href = 'user.html';
                        }
                    }, 1500); // Chờ 1.5 giây để hiện thông báo rồi mới chuyển trang
                } else {
                    showToast("Không thể đăng nhập", "error");
                }
            } catch (error) {
                showToast("Không thể kết nối đến máy chủ!", "error");
            }
        }
    </script>
</body>
</html>
